---
# SPDX-License-Identifier: Apache-2.0
# Copyright Contributors to the Egeria project
#
# Configures two Unity Catalog servers and a UI for each.
# The Unity Catalog Servers share the same image and are configured through this script
# The UC UIs each have their own image, built outside this script that bakes a different port number into the UI.
#

name: unitycatalog-egeria

services:

  unity-coco:
#    build:
#      context: .
#      dockerfile: Dockerfile
    image: unitycatalog/unitycatalog:latest
    container_name: uc-unity-coco
    ports:
      - "8087:8087"
    volumes:
#      - ./../../../runtime-volumes/unity-coco/etc:/home/unitycatalog/etc
      - uc_unity_coco:/home/unitycatalog/etc
      - ./../../../exchange-quickstart/coco-data-lake:/mnt/coco-data-lake

    command: ./bin/start-uc-server -p 8087


  server2:
      #    build:
      #      context: .
      #      dockerfile: Dockerfile
    image: unitycatalog/unitycatalog:latest
    container_name: uc_server2
    ports:
      - "8187:8187"
    volumes:
#      - ./../../../runtime-volumes/unitycatalog2/etc:/home/unitycatalog/etc
      - uc_server2:/home/unitycatalog/etc
      - ./../../../exchange-quickstart/coco-data-lake:/mnt/coco-data-lake

    command: ./bin/start-uc-server -p 8187

  unity-coco-ui:
#    build:
#      context: ui/
#      dockerfile: Dockerfile
    image: dwolfson/egeria-uc-ui-8087:latest
    container_name: uc-unity-coco-ui
    ports:
      - "3010:3010"
    depends_on:
      - unity-coco

  ui2:
#    build:
#      context: ui/
#      dockerfile: Dockerfile
    image: dwolfson/egeria-uc-ui-8187:latest
    ports:
      - "3020:3020"
    depends_on:
      - server2


volumes:
  uc_unity_coco:
    name: uc_unity_coco
    driver: local
  uc_server2:
    name: uc_server2
    driver: local
