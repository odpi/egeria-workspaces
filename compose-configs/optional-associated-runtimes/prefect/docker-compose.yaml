name: egeria-optional-prefect

services:
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: egeria-optional-prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect_user:user4prefect@egeria-shared-postgres:5442/prefect
      - PREFECT_UI_API_URL=http://localhost:4200/api
    networks:
      - egeria_network
    restart: always

  prefect-worker:
    build:
      context: ../../../runtime-volumes/prefect/user_code
      dockerfile: Dockerfile
    image: egeria-optional-prefect-worker:latest
    container_name: egeria-optional-prefect-worker
    command: prefect worker start --pool egeria-pool --type process
    depends_on:
      - prefect-server
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - ../../../runtime-volumes/prefect/user_code:/opt/prefect/flows
    networks:
      - egeria_network
    restart: always

networks:
  egeria_network:
    name: egeria_network
    external: true
