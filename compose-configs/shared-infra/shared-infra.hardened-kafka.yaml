services:
  kafka:
    # This override is opt-in and only used when ensure-shared-infra.sh adds this file.
    # Provide a compatible hardened Kafka image through KAFKA_HARDENED_IMAGE in .env.
    image: "${KAFKA_HARDENED_IMAGE}"
    environment:
      # Hardened mode persists broker data in a dedicated host path prepared by ensure-shared-infra.sh.
      KAFKA_CFG_LOG_DIRS: "${HARDENED_KAFKA_LOG_DIR}"
    volumes:
      - "${HARDENED_KAFKA_DATA_DIR}:/var/lib/kafka-data"

