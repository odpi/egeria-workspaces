services:
  proxy:
    image: egeria-shared-infra-proxy:latest
    build:
      context: ../egeria-quickstart
      dockerfile: Dockerfile-proxy
    container_name: egeria-shared-openlineage-proxy-backend
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP}"
    networks:
      - egeria_network
    ports:
      - "6000:6000"
      - "6001:6001"
    environment:
      - OPENLINEAGE_PROXY_CONFIG=/usr/src/app/proxy.yml
    volumes:
      - ../egeria-quickstart/usr/src/app/build/libs:/usr/src/app/build/libs
      - ../egeria-quickstart/proxy.yml:/usr/src/app/proxy.yml

  kafka:
    # Kafka runs on a pinned hardened image by default.
    image: "${SHARED_KAFKA_IMAGE}"
    container_name: egeria-shared-kafka
    hostname: egeria-shared-kafka
    networks:
      - egeria_network
    restart: always
    ports:
      - "9192:9192"
      - "9193:9193"
      - "9194:9194"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@127.0.0.1:9193"
      KAFKA_CFG_LISTENERS: >-
        PLAINTEXT://0.0.0.0:9192,CONTROLLER://0.0.0.0:9193,EXTERNAL://0.0.0.0:9194
      KAFKA_CFG_ADVERTISED_LISTENERS: >-
        PLAINTEXT://egeria-shared-kafka:9192,CONTROLLER://127.0.0.1:9193,EXTERNAL://${HOST_FQDN}:9194
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_KRAFT_CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
      KAFKA_CFG_LOG_DIRS: "${HARDENED_KAFKA_LOG_DIR}"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'cat < /dev/null > /dev/tcp/127.0.0.1/9192'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - "${HARDENED_KAFKA_DATA_DIR}:/var/lib/kafka-data"

  postgres:
    # Postgres is also pinned via .env so updates are explicit.
    image: "${SHARED_POSTGRES_IMAGE}"
    container_name: egeria-shared-postgres
    restart: always
    networks:
      - egeria_network
    ports:
      - "5442:5442"
    shm_size: 1gb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: egeria
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5442"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data/pgdata
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      # quickstart data files
      - ../../exchange-quickstart/coco-data-lake:/var/data/coco-data-lake
      - ../../exchange-quickstart/treasury-dts-history:/var/data/treasury-dts-history
    command: >-
      -p 5442
      -c max_connections=1000
      -c idle_in_transaction_session_timeout=1800000

  dagster-user-code:
    build:
      context: ../../runtime-volumes/dagster/user_code
      dockerfile: Dockerfile
    image: egeria-shared-infra-dagster-user-code:latest
    container_name: egeria-shared-dagster-user-code
    networks:
      - egeria_network
    environment:
      - DAGSTER_CURRENT_IMAGE=egeria-shared-dagster-user-code
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-egeria}
      - OPENLINEAGE_URL=http://egeria-shared-openlineage-proxy-backend:6000
      - OPENLINEAGE_NAMESPACE=egeria-workspace
    volumes:
      - ../../runtime-volumes/dagster/user_code:/opt/dagster/app
    ports:
      - "4000:4000"
    restart: always

  dagster-webserver:
    image: egeria-shared-infra-dagster-user-code:latest
    container_name: egeria-shared-dagster-webserver
    entrypoint: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/workspace.yaml"]
    networks:
      - egeria_network
    ports:
      - "8050:3000"
    environment:
      - DAGSTER_HOME=/opt/dagster
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-egeria}
    volumes:
      - ../../runtime-volumes/dagster:/opt/dagster
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_started
    restart: always

  dagster-daemon:
    image: egeria-shared-infra-dagster-user-code:latest
    container_name: egeria-shared-dagster-daemon
    entrypoint: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace.yaml"]
    networks:
      - egeria_network
    environment:
      - DAGSTER_HOME=/opt/dagster
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-egeria}
      - OPENLINEAGE_URL=http://egeria-shared-openlineage-proxy-backend:6000
      - OPENLINEAGE_NAMESPACE=egeria-workspace
    volumes:
      - ../../runtime-volumes/dagster:/opt/dagster
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_started
    restart: always

volumes:
  shared_postgres_data:
    external: false

networks:
  egeria_network:
    driver: bridge
    name: egeria_network
    external: true

