# apache/sites-available/fastapi-proxy.conf — freshstart

<VirtualHost *:8085>
    ServerAdmin dan.wolfson@pdr-associates.com
    ServerName localhost:8086
    ServerAlias www.localhost

    # Serve site content from Apache's htdocs
    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    # Root → portal redirect (static site has moved to /local)
    RedirectMatch ^/$ /portal

    # /local serves the legacy static website (volume mounted at htdocs/local)
    Alias /local /usr/local/apache2/htdocs/local
    <Directory "/usr/local/apache2/htdocs/local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Demo portal hub
    <Location "/portal">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/portal
        ProxyPassReverse http://freshstart-pyegeria-web:8000/portal
        Require all granted
    </Location>

    # Only proxy specific FastAPI endpoints; do not proxy the entire site
    <Location "/dr-egeria/process">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/dr-egeria/process
        ProxyPassReverse http://freshstart-pyegeria-web:8000/dr-egeria/process
        Require all granted
    </Location>

    # Egeria Explorer UI
    <Location "/egeria-explorer">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/egeria-explorer
        ProxyPassReverse http://freshstart-pyegeria-web:8000/egeria-explorer
        Require all granted
    </Location>

    # Legacy alias
    <Location "/type-explorer">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/type-explorer
        ProxyPassReverse http://freshstart-pyegeria-web:8000/type-explorer
        Require all granted
    </Location>

    # Demo auth pages
    <Location "/login">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/login
        ProxyPassReverse http://freshstart-pyegeria-web:8000/login
        Require all granted
    </Location>

    <Location "/admin">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/admin
        ProxyPassReverse http://freshstart-pyegeria-web:8000/admin
        Require all granted
    </Location>

    <Location "/profile">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/profile
        ProxyPassReverse http://freshstart-pyegeria-web:8000/profile
        Require all granted
    </Location>

    <Location "/privacy">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/privacy
        ProxyPassReverse http://freshstart-pyegeria-web:8000/privacy
        Require all granted
    </Location>

    # Static assets served by FastAPI (logos, images)
    <Location "/static">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/static
        ProxyPassReverse http://freshstart-pyegeria-web:8000/static
        Require all granted
    </Location>

    # FastAPI REST endpoints — proxy all /api/* to the pyegeria-web backend
    <Location "/api">
        ProxyPreserveHost On
        ProxyPass http://freshstart-pyegeria-web:8000/api
        ProxyPassReverse http://freshstart-pyegeria-web:8000/api
        Require all granted
    </Location>

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined

    # Add headers for better proxy behavior
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "%{Host}i"

</VirtualHost>
