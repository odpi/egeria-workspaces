  Served by PyegeriaWebHandler at /egeria-explorer

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Egeria Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #080c14;
      --panel:    #0b111c;
      --card:     #0f1828;
      --hover:    #131e30;
      --border:   #1a2d48;
      --md-code-bg: rgba(255,255,255,.08);
      --text:     #c8d4e8;
      --muted:    #7a96b0;
      --dim:      #4a6278;
      --accent:   #60a5fa;
      --abstract: #c4b5fd;
      --classif:  #5eead4;
      --rel:      #fbbf24;
      --base:     #64748b;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           font-size: 14px; height: 100vh; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input { outline: none; }
    input::placeholder { color: var(--dim); }
    button { font-family: inherit; }
    a { color: var(--accent); }

    /* layout */
    #root { display: flex; flex-direction: column; height: 100vh; }
    .header { background: var(--panel); border-bottom: 1px solid var(--border);
              padding: 10px 20px; display: flex; align-items: center; gap: 14px;
              flex-shrink: 0; }
    .body   { display: flex; flex: 1; overflow: hidden; }
    .sidebar { flex-shrink: 0; background: rgba(11,17,28,.85);
               display: flex; flex-direction: column; overflow: hidden; }
    .col-divider { width: 5px; flex-shrink: 0; cursor: col-resize; background: transparent;
                   position: relative; z-index: 1; user-select: none; }
    .col-divider::after { content: ''; position: absolute; top: 0; bottom: 0; left: 2px;
                          width: 1px; background: var(--border); transition: background .15s; }
    .col-divider:hover::after { background: var(--accent); }
    .main    { flex: 1; overflow-y: auto; background: var(--bg); }

    /* sidebar */
    .search-wrap { padding: 10px; border-bottom: 1px solid var(--border);
                   background: rgba(11,17,28,.95); position: sticky; top: 0; z-index: 1; }
    .search-input { width: 100%; background: rgba(20,32,52,.8); border: 1px solid var(--border);
                    border-radius: 5px; padding: 5px 8px; color: var(--text);
                    font-family: ui-monospace, monospace; font-size: 12px; }
    .stats { padding: 5px 10px; border-bottom: 1px solid rgba(26,45,72,.5);
             display: flex; gap: 14px; font-size: 10px; color: var(--dim); }
    .tree-scroll { flex: 1; overflow-y: auto; overflow-x: auto; padding: 4px 0; }
    .tree-item { display: flex; align-items: center; gap: 4px; padding: 3px 8px;
                 cursor: pointer; border-radius: 3px; border-left: 2px solid transparent;
                 min-width: max-content; }
    .tree-item:hover { background: var(--hover); }
    .tree-item.sel  { background: rgba(96,165,250,.1); border-left-color: var(--accent); }
    .section-hdr { padding: 5px 10px; font-size: 10px; color: var(--muted);
                   letter-spacing: 1px; cursor: pointer; display: flex; gap: 5px; }
    .section-hdr:hover { background: var(--hover); }
    .type-name { font-family: ui-monospace,monospace; font-size: 12px; flex-shrink: 0; white-space: nowrap; }
    .badge { border-radius: 4px; padding: 1px 5px; font-size: 10px;
             font-family: ui-monospace,monospace; font-weight: 500; flex-shrink: 0; white-space: nowrap; }

    /* main panel */
    .detail { padding: 20px 24px; }
    .detail-name { font-family: ui-monospace,monospace; font-size: 22px; font-weight: 700; }
    .detail-desc { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 6px; }
    .chain { display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
             margin: 12px 0; font-size: 12px; }
    .subs  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
             margin-bottom: 14px; font-size: 12px; }
    .tabs  { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab   { background: none; border: none; padding: 8px 16px; cursor: pointer;
             font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; }
    .tab.on { color: var(--accent); font-weight: 600; border-bottom-color: var(--accent); }
    table  { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 6px 10px; font-size: 11px; color: var(--muted);
         text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border);
         font-weight: 500; }
    td { padding: 7px 10px; border-bottom: 1px solid rgba(26,45,72,.4);
         font-size: 12px; color: var(--text); vertical-align: top; }
    tr.own-row td { background: rgba(96,165,250,.05); }
    tr.depr-row td { opacity: 0.6; }
    .depr { text-decoration: line-through; opacity: 0.7; }
    .mono { font-family: ui-monospace,monospace; }
    .rel-card { background: rgba(11,17,28,.6); border: 1px solid var(--border);
                border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .arrow-row { display: flex; align-items: center; gap: 10px; padding: 14px;
                 background: rgba(11,17,28,.6); border: 1px solid var(--border);
                 border-radius: 8px; margin-bottom: 16px; }

    /* loading / error */
    .center { display: flex; flex-direction: column; align-items: center;
              justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border);
               border-top-color: var(--accent); border-radius: 50%;
               animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* area selector */
    .area-select { background: rgba(20,32,52,.8); border: 1px solid var(--border);
                   border-radius: 5px; color: var(--text); padding: 3px 8px;
                   font-size: 12px; cursor: pointer; }
    .area-select option { background: #0b111c; }

    /* type chips */
    .chip { background: rgba(96,165,250,.08); border: 0.5px solid rgba(96,165,250,.3);
            color: var(--accent); border-radius: 4px; padding: 2px 8px;
            font-size: 12px; font-family: ui-monospace,monospace; cursor: pointer;
            background: none; }
    .chip:hover { background: rgba(96,165,250,.15); }

    #root { display: flex; flex-direction: column; height: 100vh; }

    /* ── Light theme ─────────────────────────────────────────────── */
    :root.light {
      --bg: #f8fafc; --panel: #ffffff; --card: #f1f5f9; --hover: #e2e8f0;
      --border: #cbd5e1; --text: #1e293b; --muted: #475569; --dim: #64748b;
      --accent: #2563eb; --abstract: #7c3aed; --classif: #0d9488; --rel: #d97706; --base: #475569;
      --md-code-bg: rgba(0,0,0,.06);
    }
    :root.light .sidebar      { background: var(--panel); }
    :root.light .search-wrap  { background: var(--panel); }
    :root.light .search-input { background: var(--hover); }
    :root.light .area-select option { background: var(--panel); }
    :root.light tr.own-row td { background: rgba(37,99,235,.05); }
    :root.light .rel-card     { background: var(--card); }
    :root.light .arrow-row    { background: var(--card); }
    body, .header, .sidebar, .main, td, .tree-item, .section-hdr, .rel-card, .arrow-row {
      transition: background-color .2s, color .2s, border-color .2s;
    }

    /* ── Mermaid diagrams ────────────────────────────────────────── */
    .mermaid-wrap { overflow-x: auto; margin: 8px 0; background: #fff; border-radius: 4px; padding: 4px; }
    .mermaid-wrap svg { max-width: 100%; }

    /* ── View tabs & theme button ────────────────────────────────── */
    .view-tab { background: none; border: none; border-bottom: 2px solid transparent;
                padding: 4px 12px; cursor: pointer; font-size: 13px; color: var(--muted);
                font-family: inherit; line-height: 1.5; }
    .view-tab.on { color: var(--accent); font-weight: 600; border-bottom-color: var(--accent); }
    .view-tab:disabled { opacity: 0.35; cursor: not-allowed; }
    .theme-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted);
                 border-radius: 20px; padding: 3px 12px; cursor: pointer; font-size: 12px;
                 font-family: inherit; }
    .theme-btn:hover { background: var(--hover); color: var(--text); }

    /* ── Nav dropdown groups ──────────────────────────────────────────── */
    .nav-group { position: relative; display: flex; align-items: stretch; }
    .nav-group-btn { background: none; border: none; border-bottom: 2px solid transparent;
                     padding: 4px 10px; cursor: pointer; font-size: 13px; color: var(--muted);
                     font-family: inherit; line-height: 1.5; display: flex; align-items: center; gap: 3px; }
    .nav-group-btn.on { color: var(--accent); font-weight: 600; border-bottom-color: var(--accent); }
    .nav-group-menu { position: absolute; top: 100%; left: 0; background: var(--panel);
                      border: 1px solid var(--border); border-radius: 6px; padding: 4px 0;
                      min-width: 172px; z-index: 100;
                      box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .nav-group-item { display: block; width: 100%; text-align: left; background: none; border: none;
                      padding: 7px 16px; font-size: 13px; color: var(--muted); font-family: inherit;
                      cursor: pointer; white-space: nowrap; }
    .nav-group-item:hover:not(:disabled) { background: var(--hover); color: var(--text); }
    .nav-group-item.on { color: var(--accent); font-weight: 600; }
    .nav-group-item:disabled { opacity: 0.35; cursor: not-allowed; }
    :root.light .nav-group-menu { box-shadow: 0 4px 14px rgba(0,0,0,.15); }

    /* ── Type-system sub-toolbar ──────────────────────────────────────── */
    .type-subbar { background: var(--panel); border-bottom: 1px solid var(--border);
                   padding: 4px 20px; display: flex; align-items: center; gap: 12px;
                   flex-shrink: 0; font-size: 12px; }

    /* ── REST API Explorer ───────────────────────────────────────── */
    .method-badge { border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 700;
                    font-family: ui-monospace, monospace; letter-spacing: .5px; flex-shrink: 0; }
    .method-GET    { background: rgba(34,197,94,.15);  color: #4ade80; }
    .method-POST   { background: rgba(96,165,250,.15); color: var(--accent); }
    .method-PUT    { background: rgba(251,191,36,.15); color: var(--rel); }
    .method-PATCH  { background: rgba(251,146,60,.15); color: #fb923c; }
    .method-DELETE { background: rgba(248,113,113,.15);color: #f87171; }
    :root.light .method-GET    { background: rgba(22,163,74,.1);  color: #15803d; }
    :root.light .method-POST   { background: rgba(37,99,235,.1);  color: #1d4ed8; }
    :root.light .method-PUT    { background: rgba(217,119,6,.1);  color: #b45309; }
    :root.light .method-PATCH  { background: rgba(234,88,12,.1);  color: #c2410c; }
    :root.light .method-DELETE { background: rgba(220,38,38,.1);  color: #b91c1c; }
    .api-three-col { display: flex; height: 100%; overflow: hidden; }
    .api-col-1 { flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
    .api-col-2 { flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
    .api-col-3 { flex: 1; overflow-y: auto; }
    .api-col-scroll { flex: 1; overflow-y: auto; }
    .api-col-hdr { padding: 8px 12px; font-size: 10px; color: var(--muted); letter-spacing: 1px;
                   border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase;
                   flex-shrink: 0; }
    .api-service-item { padding: 7px 12px; cursor: pointer; font-size: 12px; border-left: 2px solid transparent; }
    .api-service-item:hover { background: var(--hover); }
    .api-service-item.sel { background: rgba(96,165,250,.08); border-left-color: var(--accent); color: var(--accent); }
    .api-ep-item { padding: 7px 10px; cursor: pointer; border-bottom: 1px solid rgba(26,45,72,.3);
                   display: flex; align-items: flex-start; gap: 7px; }
    .api-ep-item:hover { background: var(--hover); }
    .api-ep-item.sel { background: rgba(96,165,250,.08); }
    .api-ep-path { font-family: ui-monospace,monospace; font-size: 11px; color: var(--muted);
                   word-break: break-all; line-height: 1.4; }
    .api-ep-summary { font-size: 11px; color: var(--text); margin-top: 2px; }
    .api-detail { padding: 20px 22px; }
    .api-detail-path { font-family: ui-monospace,monospace; font-size: 13px; color: var(--muted);
                       word-break: break-all; margin: 6px 0 14px; }
    .api-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase;
                          letter-spacing: 1px; font-weight: 600; margin: 18px 0 8px; }
    .api-body-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px;
                     padding: 12px 14px; margin-bottom: 12px; }
    .api-body-name { font-family: ui-monospace,monospace; font-size: 13px; color: var(--accent);
                     font-weight: 700; margin-bottom: 4px; }
    .api-body-group { font-size: 10px; color: var(--muted); text-transform: uppercase;
                      letter-spacing: .8px; margin-bottom: 8px; }
    .api-field-row { display: flex; gap: 8px; padding: 4px 0;
                     border-bottom: 1px solid rgba(26,45,72,.3); font-size: 11px; }
    .api-field-name { font-family: ui-monospace,monospace; color: var(--accent); flex-shrink: 0; min-width: 180px; }
    .api-field-note { color: var(--muted); }
    .api-json-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 5px;
                     padding: 10px 12px; font-family: ui-monospace,monospace; font-size: 11px;
                     line-height: 1.6; overflow-x: auto; white-space: pre; color: var(--text); }
    .copy-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted);
                border-radius: 4px; padding: 2px 8px; font-size: 10px; cursor: pointer;
                font-family: inherit; float: right; }
    .copy-btn:hover { background: var(--hover); color: var(--text); }
    .api-props-type { font-family: ui-monospace,monospace; font-size: 12px; color: var(--classif);
                      font-weight: 600; }

    /* ── Persona picker overlay ──────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 1000;
               display: flex; align-items: center; justify-content: center;
               backdrop-filter: blur(4px); }
    .persona-modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
                     padding: 28px 24px; width: min(860px,96vw); max-height: 90vh; overflow-y: auto; }
    .persona-modal h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .persona-modal > p { font-size: 0.8rem; color: var(--muted); margin-bottom: 18px; }
    .persona-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; }
    .persona-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
                    padding: 13px; cursor: pointer; transition: border-color .15s, background .15s; }
    .persona-card:hover { border-color: var(--accent); background: rgba(96,165,250,.06); }
    .persona-card.pcActive { border-color: var(--accent); background: rgba(96,165,250,.1); }
    .persona-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 1px; }
    .persona-title { font-size: 0.73rem; color: var(--muted); margin-bottom: 7px; }
    .persona-bio { font-size: 0.73rem; color: var(--dim); line-height: 1.45; margin-bottom: 7px; }
    .persona-hl { padding-left: 1rem; margin: 0; }
    .persona-hl li { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; list-style: disc; }
    .diff-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.68rem;
                  font-weight: 700; margin-bottom: 5px; letter-spacing: .3px; }
    .diff-Starter   { background: rgba(52,211,153,.15);  color: #34d399; }
    .diff-Business  { background: rgba(251,191,36,.15);  color: #fbbf24; }
    .diff-Technical { background: rgba(167,139,250,.15); color: #c4b5fd; }
    .persona-badge-btn { background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.3);
                         color: var(--accent); border-radius: 20px; padding: 3px 10px; font-size: 11px;
                         cursor: pointer; font-family: inherit; white-space: nowrap; }
    .persona-badge-btn:hover { background: rgba(96,165,250,.2); }
    :root.light .persona-card { background: var(--card); }
    :root.light .persona-modal { background: var(--panel); }
  </style>
  <!-- Mermaid diagram rendering (loaded synchronously so it's available when app script runs) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Vega-Lite chart rendering for report output — deferred so they don't block initial page render -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5/build/vega.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5/build/vega-lite.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6/build/vega-embed.min.js" defer></script>
</head>
<body>
  <div id="root">
    <div class="center">
      <div class="spinner"></div>
      <span>Loading Egeria Explorer…</span>
    </div>
  </div>

function ReportSpecView() {
  const [loadState, setLoadState] = useState('loading');
  const [attempt, setAttempt]     = useState(0);
  const [sideW, onDivDown] = useResizable(254);
  const [specs, setSpecs]         = useState([]);
  const [selected, setSelected]   = useState(null);
  const [history, setHistory]     = useState([]); // navigation back-stack
  const [search, setSearch]       = useState('');
  const [perspFilter, setPerspFilter] = useState('');
  const [error, setError]         = useState('');

  useEffect(() => {
    setLoadState('loading');
    setError('');
    fetch('/api/report-specs')
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const list = data.specs || [];
        setSpecs(list);
        setLoadState('ready');
        if (list.length > 0) setSelected(list[0].name);
      })
      .catch(err => { setError(err.message); setLoadState('error'); });
  }, [attempt]);

  // Collect all unique perspectives client-side from all loaded specs
  const allPerspectives = useMemo(() => {
    const set = new Set();
    specs.forEach(s => (s.question_spec || []).forEach(qs => (qs.perspectives || []).forEach(p => set.add(p))));
    return [...set].sort();
  }, [specs]);

  const navigateTo = useCallback(name => {
    setHistory(prev => selected ? [...prev, selected] : prev);
    setSelected(name);
  }, [selected]);

  const navigateBack = useCallback(() => {
    setHistory(prev => {
      if (prev.length === 0) return prev;
      const next = [...prev];
      const target = next.pop();
      setSelected(target);
      return next;
    });
  }, []);

  const filtered = useMemo(() => {
    const sq = search.toLowerCase().trim();
    const sp = perspFilter.toLowerCase();
    return specs.filter(s => {
      if (sp) {
        const perps = s.question_spec.flatMap(qs => qs.perspectives.map(p => p.toLowerCase()));
        if (!perps.includes(sp) && !perps.includes('any')) return false;
      }
      if (!sq) return true;
      if (s.name.toLowerCase().includes(sq))        return true;
      if (s.description.toLowerCase().includes(sq)) return true;
      if (s.family && s.family.toLowerCase().includes(sq)) return true;
      return s.question_spec.some(qs => qs.questions.some(qText => qText.toLowerCase().includes(sq)));
    });
  }, [specs, search, perspFilter]);

  const selectedSpec = specs.find(s => s.name === selected) || null;

  if (loadState === 'loading') return React.createElement('div', { className: 'body', style: { alignItems: 'center', justifyContent: 'center' } },
    React.createElement('div', { className: 'center' },
      React.createElement('div', { className: 'spinner' }),
      React.createElement('span', null, 'Loading report specs…')
    )
  );
  if (loadState === 'error') return React.createElement('div', { className: 'body', style: { alignItems: 'center', justifyContent: 'center' } },
    React.createElement('div', { className: 'center' },
      React.createElement('span', { style: { fontSize: 24 } }, '⚠'),
      React.createElement('span', { style: { color: '#f87171' } }, 'Failed to load report specs'),
      React.createElement('span', { style: { fontSize: 12 } }, error),
      React.createElement('button', {
        onClick: () => setAttempt(a => a + 1),
        style: { marginTop: 8, padding: '6px 16px', background: 'rgba(96,165,250,.1)', border: '1px solid rgba(96,165,250,.3)', color: 'var(--accent)', borderRadius: 5, cursor: 'pointer', fontSize: 13 }
      }, 'Retry')
    )
  );

  return React.createElement('div', { className: 'body' },
    // Sidebar
    React.createElement('div', { className: 'sidebar', style: { width: sideW } },
      React.createElement('div', { className: 'search-wrap' },
        React.createElement('input', {
          className: 'search-input',
          placeholder: 'Search name, description, questions…',
          value: search,
          onChange: e => setSearch(e.target.value)
        }),
        allPerspectives.length > 0 && React.createElement('select', {
          className: 'area-select',
          style: { width: '100%', marginTop: 6 },
          value: perspFilter,
          onChange: e => { setPerspFilter(e.target.value); }
        },
          React.createElement('option', { value: '' }, 'All perspectives'),
          allPerspectives.map(p => React.createElement('option', { key: p, value: p.toLowerCase() }, p))
        )
      ),
      React.createElement('div', { className: 'stats' },
        React.createElement('span', null,
          React.createElement('span', { style: { color: 'var(--accent)' } }, filtered.length),
          ' of ',
          React.createElement('span', { style: { color: 'var(--accent)' } }, specs.length),
          ' specs'
        )
      ),
      React.createElement('div', { className: 'tree-scroll' },
        (function() {
          var byFamily = {};
          filtered.forEach(function(s) {
            var fam = s.family || 'General';
            if (!byFamily[fam]) byFamily[fam] = [];
            byFamily[fam].push(s);
          });
          var famNames = Object.keys(byFamily).sort();
          var rows = [];
          famNames.forEach(function(fam) {
            rows.push(React.createElement('div', {
              key: 'hdr-' + fam,
              style: { padding: '6px 12px 3px', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--dim)', borderTop: '1px solid rgba(26,45,72,.4)', marginTop: rows.length ? 4 : 0 }
            }, fam + ' (' + byFamily[fam].length + ')'));
            byFamily[fam].forEach(function(s) {
              rows.push(React.createElement('div', {
                key: s.name,
                className: 'tree-item' + (selected === s.name ? ' sel' : ''),
                onClick: function() { setHistory([]); setSelected(s.name); }
              }, React.createElement('span', { className: 'type-name' }, s.name)));
            });
          });
          return rows;
        })()
      )
    ),
    React.createElement(ResizeDivider, { onMouseDown: onDivDown }),
    // Detail panel
    React.createElement('div', { className: 'main' },
      selectedSpec
        ? React.createElement('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
            history.length > 0 && React.createElement('div', { style: { padding: '6px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 } },
              React.createElement('button', {
                onClick: navigateBack,
                style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent)', fontSize: 12, display: 'flex', alignItems: 'center', gap: 4 }
              }, '← Back to ', history[history.length - 1])
            ),
            React.createElement('div', { style: { flex: 1, overflowY: 'auto' } },
              React.createElement(ReportSpecDetail, { spec: selectedSpec, onSelectSpec: navigateTo })
            )
          )
        : React.createElement('div', { className: 'center' },
            React.createElement('span', { style: { color: 'var(--muted)' } }, 'Select a report spec from the sidebar')
          )
    )
  );
}

// ── Glossary Explorer ─────────────────────────────────────────────────────────

// One term row in the glossary tree (leaf), indented by depth.
// GlossaryTermRow + GlossaryTreeNode now live in /static/egeria-shared-ui.js
// (shared with the Tech Catalog). The tree node takes a fetchJson(path) prop;
// GlossaryView supplies one below.

function GlossaryView({ navGuid, onNavigateToDataDesign, onNavigateToElement }) {
  const creds = React.useContext(CredContext);
  const [sideW, onDivDown] = useResizable(254);
  const [glossaryState, setGlossaryState] = useState('loading');
  const [glossaryAttempt, setGlossaryAttempt] = useState(0);
  const [glossaries, setGlossaries] = useState([]);
  // null = "All Terms" search mode; a guid = selected glossary
  const [selectedGlossary, setSelectedGlossary] = useState(null);
  // Folder breadcrumb stack: [{guid, displayName}]
  const [folderStack, setFolderStack] = useState([]);
  // External navigation target (from Digital Products cross-link)
  const [navTerm, setNavTerm] = useState(null);
  const [asOfTime, setAsOfTime] = useState(null);  // LE-3 point-in-time

  const [showTemplates, setShowTemplates] = useState(false);

  // Auth wrapper handed to the shared GlossaryTreeNode for lazy child loads.
  // Includes as_of_time so expanded folder children also reflect the chosen time.
  const fetchJson = React.useCallback(function(path) {
    var p = [];
    if (asOfTime) p.push('as_of_time=' + encodeURIComponent(asOfTime));
    if (showTemplates) p.push('include_templates=true');
    var sep = path.indexOf('?') !== -1 ? '&' : '?';
    var url = p.length ? path + sep + p.join('&') : path;
    return egeriaFetch(url, creds).then(function(r) { return r.ok ? r.json() : {}; });
  }, [creds, asOfTime, showTemplates]);

  // Content for current scope (glossary or folder): separate folders and terms
  const [folders, setFolders] = useState([]);
  const [terms, setTerms] = useState([]);
  const [scopeState, setScopeState] = useState('idle');
  const [scopeError, setScopeError] = useState('');

  // "All Terms" cross-glossary search
  const [searchQuery, setSearchQuery] = useState('');
  const [searchInputValue, setSearchInputValue] = useState('');
  const [searchTerms, setSearchTerms] = useState([]);
  const [searchState, setSearchState] = useState('idle');
  const [searchError, setSearchError] = useState('');

  const [selectedItem, setSelectedItem] = useState(null);
  // The selected node object (folder or term) — carried so nested tree items
  // resolve without being present in the flat top-level scope arrays.
  const [selectedData, setSelectedData] = useState(null);
  const selectItem = useCallback(function(obj, isFolder) {
    setSelectedItem(obj.guid);
    setSelectedData(Object.assign({}, obj, { isFolder: !!isFolder }));
  }, []);
  const [termDetail, setTermDetail] = useState(null);
  const [termDetailState, setTermDetailState] = useState('idle');
  const [filterText, setFilterText] = useState('');
  const [glossaryError, setGlossaryError] = useState('');

  var atParam = (function() {
    var p = [];
    if (asOfTime) p.push('as_of_time=' + encodeURIComponent(asOfTime));
    if (showTemplates) p.push('include_templates=true');
    return p.length ? '?' + p.join('&') : '';
  })();
  var atAppend = (function() {
    var p = [];
    if (asOfTime) p.push('as_of_time=' + encodeURIComponent(asOfTime));
    if (showTemplates) p.push('include_templates=true');
    return p.length ? '&' + p.join('&') : '';
  })();

  // When asOfTime changes: clear search results (user must re-run search) and reset scope
  useEffect(() => {
    setSearchTerms([]);
    setSearchState('idle');
    setSearchQuery('');
    setSearchInputValue('');
    setSelectedItem(null);
    setSelectedData(null);
    setTermDetail(null);
    setTermDetailState('idle');
  }, [asOfTime]);

  // Fetch term when cross-navigated from Digital Products
  useEffect(() => {
    if (!navGuid) { setNavTerm(null); return; }
    egeriaFetch('/api/glossary/term/' + encodeURIComponent(navGuid) + atParam, creds)
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) { if (data) { setNavTerm(data); setSelectedItem(data.guid); } })
      .catch(function() {});
  }, [navGuid, asOfTime]);

  // Current scope guid: deepest folder or the glossary itself
  const currentScopeGuid = useMemo(() => {
    if (!selectedGlossary) return null;
    return folderStack.length > 0 ? folderStack[folderStack.length - 1].guid : selectedGlossary;
  }, [selectedGlossary, folderStack]);

  // Load glossary list on mount/retry/asOfTime change
  useEffect(() => {
    setGlossaryState('loading');
    setGlossaryError('');
    egeriaFetch('/api/glossary' + atParam, creds)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const list = (data.glossaries || []).sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
        setGlossaries(list);
        setGlossaryState('ready');
        if (list.length > 0) setSelectedGlossary(list[0].guid);
      })
      .catch(err => { setGlossaryError(err.message); setGlossaryState('error'); });
  }, [glossaryAttempt, asOfTime, showTemplates]);

  // Load folders + terms whenever scope or asOfTime changes
  useEffect(() => {
    if (!currentScopeGuid) return;
    setScopeState('loading');
    setScopeError('');
    setFolders([]);
    setTerms([]);
    setSelectedItem(null);
    setSelectedData(null);
    setTermDetail(null);
    setTermDetailState('idle');
    setFilterText('');
    Promise.all([
      egeriaFetch('/api/glossary/' + encodeURIComponent(currentScopeGuid) + '/folders' + atParam, creds).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
      egeriaFetch('/api/glossary/' + encodeURIComponent(currentScopeGuid) + '/terms' + atParam, creds).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
    ])
    .then(([fData, tData]) => {
      setFolders(fData.folders || []);
      setTerms(tData.terms || []);
      setScopeState('ready');
    })
    .catch(err => { setScopeError(err.message); setScopeState('error'); });
  }, [currentScopeGuid, asOfTime, showTemplates]);

  // Cross-glossary search (asOfTime-aware)
  const runSearch = useCallback((q) => {
    const sq = (q || '').trim() || '*';
    setSearchQuery(sq);
    setSearchInputValue(sq === '*' ? '' : sq);
    setSearchState('loading');
    setSearchError('');
    setSearchTerms([]);
    setSelectedItem(null);
    setTermDetail(null);
    setTermDetailState('idle');
    egeriaFetch('/api/glossary-terms?q=' + encodeURIComponent(sq) + atAppend, creds)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => { setSearchTerms(data.terms || []); setSearchState('ready'); })
      .catch(err => { setSearchError(err.message); setSearchState('idle'); });
  }, [asOfTime, showTemplates]);

  const openFolder = useCallback((folder) => {
    setFolderStack(s => [...s, { guid: folder.guid, displayName: folder.displayName }]);
  }, []);

  const navigateTo = useCallback((idx) => {
    if (idx < 0) {
      // Back to glossary root
      setFolderStack([]);
    } else {
      setFolderStack(s => s.slice(0, idx + 1));
    }
  }, []);

  const isSearchMode = selectedGlossary === null;

  // Items shown in middle pane for glossary mode
  const filteredTerms = useMemo(() => {
    const q = filterText.trim().toLowerCase();
    return terms.filter(t => {
      if (!showTemplates && t.isTemplateSubstitute) return false;
      if (!q) return true;
      return (t.displayName || '').toLowerCase().includes(q) ||
             (t.description || '').toLowerCase().includes(q) ||
             (t.abbreviation || '').toLowerCase().includes(q);
    }).slice().sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
  }, [terms, filterText, showTemplates]);

  const templateTermCount = useMemo(() =>
    terms.filter(t => t.isTemplateSubstitute).length,
  [terms]);

  const filteredSearchTerms = useMemo(() => {
    const q = filterText.trim().toLowerCase();
    return searchTerms.filter(t => {
      if (!showTemplates && t.isTemplateSubstitute) return false;
      if (!q) return true;
      return (t.displayName || '').toLowerCase().includes(q) ||
             (t.description || '').toLowerCase().includes(q);
    }).slice().sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
  }, [searchTerms, filterText, showTemplates]);

  const selectedObj = useMemo(() => {
    // Cross-navigation target takes priority when it matches selectedItem
    if (navTerm && selectedItem === navTerm.guid) return navTerm;
    return selectedData;  // the clicked folder/term object (carries isFolder)
  }, [selectedItem, selectedData, navTerm]);

function getDualTitle(title) {
  if (!title) return '';
  var parts = title.split(/\s+/);
  var verb = parts[0];
  var rest = parts.slice(1).join(' ');
  var counterpart = { Create: 'Update', Update: 'Create', Link: 'Unlink', Unlink: 'Link', Attach: 'Detach', Detach: 'Attach', Add: 'Remove', Remove: 'Add' };
  var cv = counterpart[verb];
  return (cv && rest) ? cv + ' ' + rest : '';
}
