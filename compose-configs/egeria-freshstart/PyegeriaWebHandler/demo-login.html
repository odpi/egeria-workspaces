<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egeria — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2e3246;
      --accent: #6366f1; --accent-hover: #4f52d6; --accent-dim: #3d4068;
      --text: #e2e4f0; --muted: #8b8fa8; --error: #f87171; --success: #34d399;
      --warn: #fbbf24;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo h1 { font-size: 1.35rem; font-weight: 700; color: var(--text); }
    .logo p { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; margin-top: 1rem; }
    .pw-wrap { position: relative; display: flex; align-items: center; }
    .pw-wrap input { flex: 1; padding: 0.6rem 5rem 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.9rem; outline: none; transition: border 0.15s; width: 100%; }
    .pw-wrap input:focus { border-color: var(--accent); }
    .pw-actions { position: absolute; right: 0; display: flex; gap: 0; height: 100%; }
    .pw-btn { background: none; border: none; border-left: 1px solid var(--border); color: var(--muted); cursor: pointer;
      font-size: 0.75rem; padding: 0 0.5rem; transition: color 0.15s; display: flex; align-items: center; }
    .pw-btn:hover { color: var(--text); }
    .btn {
      display: block; width: 100%; padding: 0.65rem; margin-top: 1.5rem;
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 0.65rem 0.75rem; border-radius: 6px; font-size: 0.84rem; display: none; }
    .msg.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.35); color: var(--error); }
    .msg.success { background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.35);  color: var(--success); }
    .msg.warn    { background: rgba(251,191,36,0.12);  border: 1px solid rgba(251,191,36,0.35);  color: var(--warn); }
    .change-note { font-size: 0.82rem; color: var(--warn); margin-bottom: 1rem; padding: 0.6rem 0.75rem;
      background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3); border-radius: 6px; display: none; }
    .toggle-link { display: block; text-align: right; font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem;
      cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
    .toggle-link:hover { color: var(--text); }
    #newPwSection { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:0.75rem">
      <img src="/static/egeria-logo.png" alt="Egeria" style="height:36px">
    </div>
    <h1 id="orgTitle">Egeria Environment</h1>
    <p>Sign in with your Egeria credentials</p>
  </div>

  <label for="userId">User ID</label>
  <input type="text" id="userId" placeholder="your-user-id" autocomplete="username"
    style="width:100%;padding:0.6rem 0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.9rem;outline:none;">

  <label for="password">Password</label>
  <div class="pw-wrap">
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <div class="pw-actions">
      <button type="button" class="pw-btn" onclick="toggleShow('password', this)" title="Show/hide">👁</button>
      <button type="button" class="pw-btn" onclick="copyPw('password')" title="Copy">⎘</button>
    </div>
  </div>
  <button type="button" class="toggle-link" id="toggleChangePw" onclick="showNewPwSection()">Set new password</button>

  <div id="newPwSection">
    <div class="change-note" id="changeNote">Your password must be changed before you can continue.</div>

    <label for="newPassword">New password</label>
    <div class="pw-wrap">
      <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
      <div class="pw-actions">
        <button type="button" class="pw-btn" onclick="toggleShow('newPassword', this)" title="Show/hide">👁</button>
        <button type="button" class="pw-btn" onclick="copyPw('newPassword')" title="Copy">⎘</button>
      </div>
    </div>

    <label for="confirmPassword">Confirm new password</label>
    <div class="pw-wrap">
      <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
      <div class="pw-actions">
        <button type="button" class="pw-btn" onclick="toggleShow('confirmPassword', this)" title="Show/hide">👁</button>
        <button type="button" class="pw-btn" onclick="copyPw('confirmPassword')" title="Copy">⎘</button>
      </div>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="msg" id="loginMsg"></div>
</div>

<script>
  fetch('/api/platform/org-name').then(r => r.json()).then(d => {
    if (d.name) document.getElementById('orgTitle').textContent = 'Welcome — ' + d.name;
  }).catch(() => {});

  fetch('/api/auth/me').then(r => r.json()).then(data => {
    if (data.authenticated) window.location.href = '/portal';
  }).catch(() => {});

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function showNewPwSection(forced) {
    var sec = document.getElementById('newPwSection');
    sec.style.display = 'block';
    document.getElementById('toggleChangePw').style.display = 'none';
    if (forced) {
      document.getElementById('changeNote').style.display = 'block';
    }
    document.getElementById('newPassword').focus();
  }

  function toggleShow(fieldId, btn) {
    var inp = document.getElementById(fieldId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function copyPw(fieldId) {
    var val = document.getElementById(fieldId).value;
    if (!val) return;
    navigator.clipboard.writeText(val).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = val; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
  }

  function showMsg(type, text) {
    var el = document.getElementById('loginMsg');
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  function doLogin() {
    var userId   = document.getElementById('userId').value.trim();
    var password = document.getElementById('password').value;
    var newPw    = document.getElementById('newPassword').value;
    var confPw   = document.getElementById('confirmPassword').value;
    var changingPw = document.getElementById('newPwSection').style.display === 'block' && newPw;

    if (!userId || !password) { showMsg('error', 'Please enter your user ID and password.'); return; }

    if (changingPw) {
      if (newPw !== confPw) { showMsg('error', 'New passwords do not match.'); return; }
      if (newPw.length < 8) { showMsg('error', 'New password must be at least 8 characters.'); return; }
      doChangePassword(userId, password, newPw);
      return;
    }

    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, password: password }),
    }).then(function(r) {
      return r.json().then(function(d) { return { status: r.status, data: d }; });
    }).then(function(res) {
      btn.disabled = false; btn.textContent = 'Sign In';
      if (res.status === 200) {
        window.location.href = '/portal';
      } else if (res.status === 403 && res.data.credentials_expired) {
        showNewPwSection(true);
        showMsg('warn', 'Enter a new password below to continue.');
      } else {
        showMsg('error', res.data.detail || 'Invalid user ID or password.');
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Sign In';
      showMsg('error', 'Network error — please try again.');
    });
  }

  function doChangePassword(userId, password, newPw) {
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, password: password, new_password: newPw }),
    }).then(function(r) {
      return r.json().then(function(d) { return { ok: r.ok, data: d }; });
    }).then(function(res) {
      btn.disabled = false; btn.textContent = 'Sign In';
      if (res.ok) {
        showMsg('success', 'Password changed. Redirecting…');
        setTimeout(function() { window.location.href = '/portal'; }, 800);
      } else {
        showMsg('error', res.data.detail || 'Password change failed.');
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Sign In';
      showMsg('error', 'Network error — please try again.');
    });
  }
</script>
</body>
</html>
