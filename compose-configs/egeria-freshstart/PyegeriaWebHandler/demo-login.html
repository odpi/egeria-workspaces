<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egeria — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2e3246;
      --accent: #6366f1; --accent-hover: #4f52d6; --accent-dim: #3d4068;
      --text: #e2e4f0; --muted: #8b8fa8; --error: #f87171; --success: #34d399;
      --warn: #fbbf24;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo h1 { font-size: 1.35rem; font-weight: 700; color: var(--text); }
    .logo p { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; margin-top: 1rem; }
    input[type=text], input[type=password] {
      width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.9rem; outline: none; transition: border 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      display: block; width: 100%; padding: 0.65rem; margin-top: 1.5rem;
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 0.65rem 0.75rem; border-radius: 6px; font-size: 0.84rem; display: none; }
    .msg.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.35); color: var(--error); }
    .msg.success { background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.35);  color: var(--success); }
    .msg.warn    { background: rgba(251,191,36,0.12);  border: 1px solid rgba(251,191,36,0.35);  color: var(--warn); }
    #changeForm { display: none; }
    #changeForm .note { font-size: 0.82rem; color: var(--warn); margin-bottom: 1rem; padding: 0.6rem 0.75rem; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3); border-radius: 6px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:0.75rem">
      <img src="/static/egeria-logo.png" alt="Egeria" style="height:36px">
    </div>
    <h1 id="orgTitle">Egeria Environment</h1>
    <p>Sign in with your Egeria credentials</p>
  </div>

  <!-- Sign-in form -->
  <div id="loginForm">
    <label for="userId">User ID</label>
    <input type="text" id="userId" placeholder="your-user-id" autocomplete="username">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- Forced password-change form (shown when CREDENTIALS_EXPIRED) -->
  <div id="changeForm">
    <div class="note">Your password must be changed before you can continue.</div>
    <input type="hidden" id="oldPassword">
    <label for="newPassword">New password</label>
    <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
    <label for="confirmPassword">Confirm new password</label>
    <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" id="changeBtn" onclick="doChangePassword()">Set New Password</button>
    <div class="msg" id="changeMsg"></div>
  </div>
</div>

<script>
  // Pre-fill org name
  fetch('/api/platform/org-name').then(r => r.json()).then(d => {
    if (d.name) document.getElementById('orgTitle').textContent = 'Welcome — ' + d.name;
  }).catch(() => {});

  // Redirect if already authenticated
  fetch('/api/auth/me').then(r => r.json()).then(data => {
    if (data.authenticated) window.location.href = '/portal';
  }).catch(() => {});

  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (document.getElementById('changeForm').style.display === 'block') doChangePassword();
    else doLogin();
  });

  var _pendingUserId = '';

  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  function doLogin() {
    var userId   = document.getElementById('userId').value.trim();
    var password = document.getElementById('password').value;
    if (!userId || !password) { showMsg('loginMsg', 'error', 'Please enter your user ID and password.'); return; }
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, password: password }),
    }).then(function(r) {
      return r.json().then(function(d) { return { status: r.status, data: d }; });
    }).then(function(res) {
      btn.disabled = false; btn.textContent = 'Sign In';
      if (res.status === 200) {
        window.location.href = '/portal';
      } else if (res.status === 403 && res.data.credentials_expired) {
        // Slide to password-change form
        _pendingUserId = res.data.user_id || userId;
        document.getElementById('oldPassword').value = password;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('changeForm').style.display = 'block';
        document.getElementById('newPassword').focus();
      } else {
        showMsg('loginMsg', 'error', res.data.detail || 'Invalid user ID or password.');
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Sign In';
      showMsg('loginMsg', 'error', 'Network error — please try again.');
    });
  }

  function doChangePassword() {
    var oldPw  = document.getElementById('oldPassword').value;
    var newPw  = document.getElementById('newPassword').value;
    var confPw = document.getElementById('confirmPassword').value;
    if (!oldPw || !newPw || !confPw) { showMsg('changeMsg', 'error', 'Please fill in all password fields.'); return; }
    if (newPw !== confPw) { showMsg('changeMsg', 'error', 'New passwords do not match.'); return; }
    if (newPw.length < 8) { showMsg('changeMsg', 'error', 'Password must be at least 8 characters.'); return; }
    var btn = document.getElementById('changeBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: _pendingUserId, password: oldPw, new_password: newPw }),
    }).then(function(r) {
      return r.json().then(function(d) { return { ok: r.ok, data: d }; });
    }).then(function(res) {
      btn.disabled = false; btn.textContent = 'Set New Password';
      if (res.ok) {
        showMsg('changeMsg', 'success', 'Password changed. Redirecting…');
        setTimeout(function() { window.location.href = '/portal'; }, 800);
      } else {
        showMsg('changeMsg', 'error', res.data.detail || 'Password change failed.');
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Set New Password';
      showMsg('changeMsg', 'error', 'Network error — please try again.');
    });
  }
</script>
</body>
</html>
