services:
  freshstart-jupyter-hub:
    depends_on:
      freshstart-egeria-main:
        condition: service_healthy
    image: egeria-freshstart-jupyter:local
    pull_policy: never
    container_name: freshstart-jupyter-work-full
    user: root
    networks:
      - egeria_network
    ports:
      - "7888:7888"
      - "7889:5678"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "egeria"
      JUPYTER_PORT: "7888"
      # pyegeria's render_mermaid() tries this local, self-hosted Kroki first
      # (shared-infra.yaml) and falls back to rendering client-side in the
      # browser if it's absent/unreachable — no dependency on kroki.io.
      EGERIA_KROKI_URL: "http://egeria-shared-kroki:8000"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    build:
      context: ../egeria-quickstart
      dockerfile: Dockerfile-jupyter
    volumes:
      - ../egeria-quickstart/before-notebook.d:/usr/local/bin/before-notebook.d
      - ../../work:/home/jovyan/work
      - ../../workbooks:/home/jovyan/workbooks
      - ../../exchange-freshstart/distribution-hub:/home/jovyan/distribution-hub
      - ../../exchange-freshstart/loading-bay:/home/jovyan/loading-bay
      - ../../exchange-freshstart/landing-area:/home/jovyan/landing-area
      - ../../exchange-freshstart/config:/home/jovyan/config
      - ../../templates:/home/jovyan/templates

  freshstart-egeria-main:
    image: 'egeria-freshstart-platform:local'
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile-egeria-platform
    networks:
      - egeria_network
    ports:
      - '8443:8443'
      - '5006:5005'
    environment:
      startup.server.list: "fs-metadata-store,fs-engine-host,fs-integration-daemon,fs-view-server"
      server.port: "8443"
      HOST_FQDN: "${HOST_FQDN}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9194}"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    healthcheck:
      test: curl -k -X GET "https://localhost:8443/open-metadata/platform-services/users/garygeeke/server-platform/origin" || exit 1
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ../../exchange-freshstart/landing-area:/deployments/landing-area
      - ../../exchange-freshstart/distribution-hub:/deployments/distribution-hub
      - ../../exchange-freshstart/distribution-hub/surveys:/deployments/surveys
      - ../../runtime-volumes/freshstart-platform-data/logs:/deployments/logs
      - ../../runtime-volumes/freshstart-platform-data/data:/deployments/data
      - ../../runtime-volumes/freshstart-platform-data/secrets:/deployments/secrets
      - ../../exchange-freshstart/loading-bay:/deployments/loading-bay
      - ../../work:/deployments/work
      - ../../runtime-volumes/freshstart-platform-data/freshstart.application.properties:/deployments/application.properties

  freshstart-pyegeria-web:
    image: egeria-freshstart-pyegeria-web:latest
    pull_policy: never
    container_name: freshstart-pyegeria-web
    build:
      context: ./PyegeriaWebHandler
      dockerfile: ./Dockerfile-fast-api
    ports:
      - "7800:8000"
    networks:
      - egeria_network
    environment:
      EGERIA_PLATFORM_URL: https://freshstart-egeria-main:8443
      EGERIA_VIEW_SERVER: fs-view-server
      EGERIA_VIEW_SERVER_URL: https://freshstart-egeria-main:8443
      EGERIA_INTEGRATION_DAEMON_URL: https://freshstart-egeria-main:8443
      # Service account used by handlers that don't receive a user's bearer token.
      # Uses the same account as the admin caller so credentials stay in sync.
      EGERIA_USER: "${EGERIA_ADMIN_CALLER_ID:-bootstrap}"
      EGERIA_USER_PASSWORD: "${EGERIA_ADMIN_CALLER_PASSWORD:-secret}"
      EGERIA_ROOT_PATH: "/"
      EGERIA_INBOX_PATH: "dr-egeria-inbox"
      EGERIA_OUTBOX_PATH: "dr-egeria-outbox"
      MCP_ACCESS_TOKEN: "egeria-secret-mcp-token"
      # ── Auth (Egeria-backed, no SQLite) ──────────────────────────────────────
      DEMO_MODE: "false"
      FEEDBACK_DB_PATH: "/app/demo-data/feedback.db"
      JWT_SECRET: "${JWT_SECRET:-change-me-before-going-public}"
      SITE_URL: "http://localhost:7885"
      # Comma-separated Egeria user IDs that receive portal admin role.
      # Add your own admin userId here after first login.
      EGERIA_ADMIN_USERS: "bootstrap"
      # Service account used to obtain fresh Egeria tokens for SecurityOfficer calls.
      # Password must be set in .env as EGERIA_ADMIN_CALLER_PASSWORD (never here).
      EGERIA_ADMIN_CALLER_ID: "bootstrap"
      # Optional: override org name if not read from application.properties.
      EGERIA_ORG_NAME: "${EGERIA_ORG_NAME:-My Organisation}"
      EGERIA_USER_SECRETS_PATH: "/secrets/user-directory.omsecrets"
      APPLICATION_PROPERTIES_PATH: "/platform/application.properties"
      # Egeria Advisor URL — checked server-side; set in .env if running on a non-default port/host
      EGERIA_ADVISOR_URL: "${EGERIA_ADVISOR_URL:-http://localhost:7880/}"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    volumes:
      - ./PyegeriaWebHandler:/app
      - ../../runtime-volumes/freshstart-platform-data/freshstart.application.properties:/platform/application.properties:ro
      - ../../exchange-freshstart/distribution-hub/dr-egeria-outbox:/dr-egeria-outbox
      - ../../exchange-freshstart/loading-bay/dr-egeria-inbox:/dr-egeria-inbox
      - ../../exchange-freshstart/config:/config
      - ../../templates:/app/templates
      - ../../runtime-volumes/freshstart-demo-data:/app/demo-data
      - ../../runtime-volumes/freshstart-platform-data/secrets/egeria-user-directory.omsecrets:/secrets/user-directory.omsecrets
      # TC-13: read-only data dirs at the same /deployments/* paths the Egeria
      # platform sees, so file Data Assets' pathName resolves for tabular preview.
      - ../../exchange-freshstart/loading-bay:/deployments/loading-bay:ro
      - ../../exchange-freshstart/landing-area:/deployments/landing-area:ro
      - ../../exchange-freshstart/distribution-hub:/deployments/distribution-hub:ro
    depends_on:
      - freshstart-egeria-main
    command: "uvicorn pyegeria_handler:app --host '::' --port 8000 --reload --loop asyncio"

  freshstart-apache-web:
    image: egeria-freshstart-apache-web:latest
    pull_policy: never
    build:
      context: ../egeria-quickstart
      dockerfile: Dockerfile-apache-web
    container_name: freshstart-web-server
    ports:
      - "7885:8085"
    networks:
      - egeria_network
    volumes:
      - ../../exchange-freshstart/distribution-hub/dr-egeria-outbox:/usr/local/apache2/htdocs/dr-egeria-outbox
      - ../../exchange-freshstart/loading-bay/dr-egeria-inbox:/usr/local/apache2/htdocs/dr-egeria-inbox
      - ../egeria-quickstart/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./sites-available/fastapi-proxy.conf:/usr/local/apache2/conf/extra/fastapi-proxy.conf
      - ../egeria-quickstart/markdown-header.html:/usr/local/apache2/conf/markdown-header.html
      - ../../runtime-volumes/freshstart-apache-web/ErrorLogs:/usr/local/apache2/logs
      - ../../templates:/usr/local/apache2/htdocs/Dr-Egeria-Samples/templates
      - ../../portal-docs:/usr/local/apache2/htdocs/docs
    depends_on:
      - freshstart-pyegeria-web

networks:
  egeria_network:
    driver: bridge
    name: egeria_network
    external: true

