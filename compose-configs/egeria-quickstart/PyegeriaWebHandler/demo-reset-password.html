<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egeria Quickstart Demo Sandbox — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2e3246;
      --accent: #6366f1; --accent-hover: #4f52d6;
      --text: #e2e4f0; --muted: #8b8fa8; --error: #f87171; --success: #34d399;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo h1 { font-size: 1.35rem; font-weight: 700; color: var(--text); }
    .logo p { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; margin-top: 1rem; }
    input[type=password] {
      width: 100%; padding: 0.6rem 0.75rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.9rem; outline: none; transition: border 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      display: block; width: 100%; padding: 0.65rem; margin-top: 1.5rem;
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: 0.65rem 0.75rem; border-radius: 6px; font-size: 0.84rem; display: none; }
    .msg.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.35); color: var(--error); }
    .msg.success { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.35); color: var(--success); }
    .links { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); }
    .links a { color: var(--accent); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    #invalidMsg { text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:0.5rem">
      <img src="/static/egeria-logo.png" alt="Egeria" style="height:36px">
      <img src="/static/pdr-logo.png"    alt="PDR"    style="height:36px">
    </div>
    <h1>Egeria Quickstart Demo Sandbox</h1>
    <p>Coco Pharmaceuticals</p>
  </div>

  <div id="resetForm">
    <h3 style="font-size:0.95rem;margin-bottom:0.5rem">Set a new password</h3>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:1rem">Choose a password that's at least 8 characters.</p>
    <label for="newPassword">New password</label>
    <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
    <label for="confirmPassword">Confirm password</label>
    <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" id="submitBtn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="resetMsg"></div>
  </div>

  <div id="invalidMsg" style="display:none">
    <p style="color:var(--error);margin-bottom:1rem">This reset link is invalid or has expired.</p>
    <div class="links"><a href="/login">← Back to sign in</a></div>
  </div>

  <div class="divider"></div>
  <div class="links"><a href="/login">← Back to sign in</a></div>
</div>

<script>
  var token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidMsg').style.display = 'block';
  }

  function showMsg(type, text) {
    var el = document.getElementById('resetMsg');
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  function doReset() {
    var pw  = document.getElementById('newPassword').value;
    var pw2 = document.getElementById('confirmPassword').value;
    if (!pw || pw.length < 8) { showMsg('error', 'Password must be at least 8 characters.'); return; }
    if (pw !== pw2) { showMsg('error', 'Passwords do not match.'); return; }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: pw }),
    }).then(function(r) {
      return r.json().then(function(d) { return { ok: r.ok, data: d }; });
    }).then(function(res) {
      btn.disabled = false; btn.textContent = 'Set New Password';
      if (res.ok) {
        showMsg('success', 'Password updated! Redirecting to sign in…');
        setTimeout(function() { window.location.href = '/login'; }, 1500);
      } else {
        var detail = res.data.detail || 'Reset failed — the link may have expired.';
        showMsg('error', detail);
        if (res.status === 400) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('invalidMsg').style.display = 'block';
        }
      }
    }).catch(function() {
      btn.disabled = false; btn.textContent = 'Set New Password';
      showMsg('error', 'Network error — please try again.');
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doReset();
  });
</script>
</body>
</html>
