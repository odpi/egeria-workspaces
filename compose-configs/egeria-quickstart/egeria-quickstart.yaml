---
# SPDX-License-Identifier: Apache-2.0
# Copyright Contributors to the Egeria project


# To run
#   * Ensure Docker is installed and running
#   * Start Egeria Platform stack from the 'coco-lab-docker-compose' folder using:
#     'docker compose -f ./egeria-platform-jupyter-uc-compose.yaml up --build'
#   * Subsequent startups can be performed without the '--build' at the end
#   * Uninstall the containers by issuing 'docker compose -f ./egeria-platform-jupyter-uc-compose.yaml down'
#
# Assumptions:
#   * Ports 9443 and 9192 are available on the host system - these are the default ports for Kafka and Egeria.
#   * Port 8885 is used for the external web server
#   * Port 8888 is used by jupyter server
#   * by default, the jupyter notebooks in the 'coco-workbooks' folder are mounted at /home/jovyan/coco-worksbooks
#   * by default, strict SSL validation is turned off
#
#

services:
  jupyter-hub:
    depends_on:
      egeria-main:
        condition: service_started

    image: egeria-quickstart-jupyter:local
    container_name: quickstart-jupyter-work-full
    user: root
    networks:
      - egeria_network
    ports:
      - 8888:7888
      - 8889:5678

    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "egeria"
      JUPYTER_PORT: "7888"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"

    build:
      context: .
      dockerfile: Dockerfile-jupyter
    volumes:
      - ./before-notebook.d:/usr/local/bin/before-notebook.d
      - ../../work:/home/jovyan/work
      - ../../coco-workbooks:/home/jovyan/coco-workbooks
      - ../../templates:/home/jovyan/templates
      - ../../exchange-quickstart/distribution-hub:/home/jovyan/distribution-hub
      - ../../exchange-quickstart/loading-bay:/home/jovyan/loading-bay
      - ../../exchange-quickstart/landing-area:/home/jovyan/landing-area
      - ../../exchange-quickstart/coco-data-lake:/home/jovyan/coco-data-lake
      - ../../exchange-quickstart/treasury-dts-history:/home/jovyan/treasury-dts-history
      - ../../exchange-quickstart/config:/home/jovyan/config

  egeria-main:
    image: 'egeria-quickstart-platform:local'
    container_name: quickstart-egeria-main
    build:
      context: .
      dockerfile: Dockerfile-egeria-platform
    #        image: 'docker.io/odpi/egeria-platform:stable'
    networks:
      - egeria_network
    ports:
      - '9443:9443'
      - '5005:5005'
    environment:
      XTDB_ENABLE_BYTEUTILS_SHA1: "True"
      XTDB_DISABLE_LIBCRYPTO: "True"
      startup.server.list: "qs-metadata-store,qs-engine-host,qs-integration-daemon,qs-view-server"
      server.port: "9443"
      HOST_FQDN: "${HOST_FQDN}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9194}"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    healthcheck:
      test: curl -k -X GET "https://localhost:9443/open-metadata/platform-services/users/garygeeke/server-platform/origin" || exit 1
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 60s
    volumes:
      - ../../exchange-quickstart/landing-area:/deployments/landing-area
      - ../../exchange-quickstart/distribution-hub:/deployments/distribution-hub
      - ../../exchange-quickstart/distribution-hub/surveys:/deployments/surveys
      - ../../runtime-volumes/quickstart-platform-data/logs:/deployments/logs
      - ../../runtime-volumes/quickstart-platform-data/security-logs:/deployments/logs/security
      - ../../runtime-volumes/quickstart-platform-data/data:/deployments/data
      - ../../runtime-volumes/quickstart-platform-data/secrets:/deployments/secrets
      - ../../exchange-quickstart/loading-bay:/deployments/loading-bay
      - ../../exchange-quickstart/coco-data-lake:/deployments/coco-data-lake
      - ../../exchange-quickstart/treasury-dts-history:/deployments/treasury-dts-history
      - ../../work:/deployments/work
      - ../../runtime-volumes/quickstart-platform-data/quickstart.application.properties:/deployments/application.properties

  # Define your FastAPI application service
  pyegeria-web:
    image: egeria-quickstart-pyegeria-web:latest
    container_name: quickstart-pyegeria-web
    build:
      context: ./PyegeriaWebHandler
      dockerfile: ./Dockerfile-fast-api
    ports:
      - "8800:8000" # host 8800 -> container 8000 (moved off 8000; see BACKLOG Ports & Networking)
    networks:
      - egeria_network
    environment:
      EGERIA_PLATFORM_URL: https://host.docker.internal:9443
      EGERIA_VIEW_SERVER: qs-view-server
      EGERIA_VIEW_SERVER_URL: https://host.docker.internal:9443
      EGERIA_INTEGRATION_DAEMON_URL: https://host.docker.internal:9443
      EGERIA_ROOT_PATH: "/"
      EGERIA_INBOX_PATH: "."
      EGERIA_OUTBOX_PATH: "dr-egeria-outbox"
      MCP_ACCESS_TOKEN: "egeria-secret-mcp-token"
      # ── Demo mode — set DEMO_MODE=true to enable public access with auth ──────
      DEMO_MODE: "false"
      DEMO_DB_PATH: "/app/demo-data/demo.db"
      FEEDBACK_DB_PATH: "/app/demo-data/feedback.db"
      JWT_SECRET: "${JWT_SECRET:-change-me-before-going-public-meow}"
      SITE_URL: "http://localhost:8885"
      # Resend — set RESEND_API_KEY and RESEND_FROM in .env (never in the yaml)
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM: "${RESEND_FROM:-}"
      ADMIN_BOOTSTRAP_EMAIL: "${ADMIN_BOOTSTRAP_EMAIL:-}"
      ADMIN_BOOTSTRAP_PASSWORD: "${ADMIN_BOOTSTRAP_PASSWORD:-}"
      # ── Portal tile config ────────────────────────────────────────────────────
      # OBSIDIAN_VAULT_URL: vault name or obsidian:// URI — set in .env if using local Obsidian
      OBSIDIAN_VAULT_URL: "${OBSIDIAN_VAULT_URL:-}"
      # Egeria Advisor URL — checked server-side; set in .env if running on a non-default port/host
      EGERIA_ADVISOR_URL: "${EGERIA_ADVISOR_URL:-http://localhost:8880/}"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    volumes:
      - ./PyegeriaWebHandler:/app
      - ../../exchange-quickstart/config:/config
      - ../../work:/work
      - ../../coco-workbooks:/coco-workbooks
      - ../../templates:/app/templates
      - ../../runtime-volumes/quickstart-demo-data:/app/demo-data
      # TC-13: read-only data dirs at the same /deployments/* paths the Egeria
      # platform sees, so file Data Assets' pathName resolves for tabular preview.
      - ../../exchange-quickstart/loading-bay:/deployments/loading-bay:ro
      - ../../exchange-quickstart/landing-area:/deployments/landing-area:ro
      - ../../exchange-quickstart/coco-data-lake:/deployments/coco-data-lake:ro
      - ../../exchange-quickstart/distribution-hub:/deployments/distribution-hub:ro
      - ../../exchange-quickstart/treasury-dts-history:/deployments/treasury-dts-history:ro
# Mount the dr-egeria-inbox directory
#    environment:
      # Pass environment variables to the container
#      - REMOTE_SERVER_BASE_URL=https://host.docker.internal:9443
#      - API_KEY=your_secret_api_key # Example for sensitive data
    depends_on:
      # If your FastAPI app depends on a database, specify it here
      - egeria-main
    # Optional: for development, you might want hot-reloading
#     command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    command: uvicorn pyegeria_handler:app --host "::" --port 8000 --reload --loop asyncio

  apache-web:
    image: egeria-quickstart-apache-web:latest
    build:
      context: .
      dockerfile: Dockerfile-apache-web
    container_name: quickstart-web-server
    ports:
      - "8885:8085"
      # SSL (port 443) — disabled by default. See demo-mode.md § SSL / HTTPS.
      # - "443:443"
    networks:
      - egeria_network
    volumes:
      - ../../work:/usr/local/apache2/htdocs/work
      - ../../coco-workbooks:/usr/local/apache2/htdocs/coco-workbooks
#      - ../../exchange-quickstart/loading-bay/dr-egeria-inbox:/usr/local/apache2/htdocs/dr-egeria-inbox
      - ./httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./sites-available/fastapi-proxy.conf:/usr/local/apache2/conf/extra/fastapi-proxy.conf
      - ./sites-available/proxy-locations.conf:/usr/local/apache2/conf/extra/proxy-locations.conf
      - ./markdown-header.html:/usr/local/apache2/conf/markdown-header.html
      - ../../runtime-volumes/quickstart-apache-web/ErrorLogs:/usr/local/apache2/logs
      - ../../templates:/usr/local/apache2/htdocs/Dr-Egeria-Samples/templates
      - ../../portal-docs:/usr/local/apache2/htdocs/docs
      # SSL cert volume — disabled by default. See demo-mode.md § SSL / HTTPS.
      # - ./sites-available/fastapi-ssl.conf:/usr/local/apache2/conf/extra/fastapi-ssl.conf
      # - /path/to/your/certs:/etc/ssl/egeria:ro
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    depends_on:
      - pyegeria-web

  my-profile:
    image: egeria-quickstart-my-profile:local
    container_name: quickstart-my-profile
    build:
      context: .
      dockerfile: Dockerfile-my-egeria
    networks:
      - egeria_network
    ports:
      - "8820:8020"
    environment:
      EGERIA_PLATFORM_URL:  "https://host.docker.internal:9443"
      EGERIA_VIEW_SERVER:   "qs-view-server"
      # peterprofile loads cleanly; erinoverview/garygeeke currently 401 on the
      # /my-profile endpoint despite a valid token (see ME-7 follow-up note).
      EGERIA_USER:          "${QUICKSTART_PERSONA_USER:-peterprofile}"
      EGERIA_USER_PASSWORD: "${QUICKSTART_PERSONA_PASSWORD:-secret}"
      MY_EGERIA_HOST:       "0.0.0.0"
      MY_PROFILE_PORT:      "8020"
      # Externally-visible URL via the Apache proxy — makes textual-serve emit
      # same-origin static/WebSocket URLs so the page CSP ('self') allows them.
      MY_EGERIA_PUBLIC_URL: "${MY_EGERIA_PUBLIC_URL:-http://localhost:8885/my-egeria}"
    extra_hosts:
      - "${HOST_FQDN}:${HOST_GATEWAY_IP:-host-gateway}"
      - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"
    depends_on:
      egeria-main:
        condition: service_healthy

  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian-quickstart
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ../../coco-workbooks:/config/vaults
      - ../../templates:/config/templates
      - ../../runtime-volumes/obsidian-config:/config/.config  # persists app-level settings
    ports:
      - "8860:3000"
      - "8861:3001"
    networks:
      - egeria_network
    restart: unless-stopped
#    mem_limit: 2g # Optional: limit memory usage
#   To add KasmVNC authentication, add to environment above:
#     - CUSTOM_USER=youruser
#     - PASSWORD=yourpassword
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  egeria_network:
    driver: bridge
    name: egeria_network
    external: true
