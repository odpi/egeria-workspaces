# Copyright Contributors to the Egeria project


# To run
#   * Ensure Docker is installed and running
#   * Start Egeria Platform stack from the 'coco-lab-docker-compose' folder using:
#     'docker compose -f ./egeria-platform-jupyter-uc-compose.yaml up --build'
#   * Subsequent startups can be performed without the '--build' at the end
#   * Uninstall the containers by issuing 'docker compose -f ./egeria-platform-jupyter-uc-compose.yaml down'
#
# Assumptions:
#   * Ports 9443 and 9192 are available on the host system - these are the default ports for Kafka and Egeria.
#   * Port 8085 is used for the external web server
#   * Port 7888 is used by jupyter server
#   * by default, the jupyter notebooks in the 'coco-workbooks' folder are mounted at /home/jovyan/coco-worksbooks
#   * by default, strict SSL validation is turned off
#
#

services:
  jupyter-hub:
    depends_on:
      egeria-main:
        condition: service_healthy

    image: egeria-quickstart-jupyter:local
    container_name: quickstart-jupyter-work-full
    networks:
      - egeria_network
    ports:
      - 7888:7888
      - 5678:5678

    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "egeria"
      JUPYTER_PORT: "7888"

    build:
      context: .
      dockerfile: Dockerfile-jupyter
    volumes:
      - ./before-notebook.d:/usr/local/bin/before-notebook.d
      - ../../work:/home/jovyan/work
      - ../../coco-workbooks:/home/jovyan/coco-workbooks
      - ../../workbooks:/home/jovyan/workbooks
      - ../../exchange-quickstart/distribution-hub:/home/jovyan/distribution-hub
      - ../../exchange-quickstart/loading-bay:/home/jovyan/loading-bay
      - ../../exchange-quickstart/landing-area:/home/jovyan/landing-area
      - ../../exchange-quickstart/coco-data-lake:/home/jovyan/coco-data-lake
      - ../../exchange-quickstart/treasury-dts-history:/home/jovyan/treasury-dts-history
      - ../../exchange-quickstart/config:/home/jovyan/config

  egeria-main:
    image: 'egeria-quickstart-platform:local'
    build:
      context: .
      dockerfile: Dockerfile-egeria-platform
    #        image: 'docker.io/odpi/egeria-platform:stable'
    networks:
      - egeria_network
    ports:
      - '9443:9443'
      - '5005:5005'
    environment:
      XTDB_ENABLE_BYTEUTILS_SHA1: "True"
      XTDB_DISABLE_LIBCRYPTO: "True"
      startup.server.list: "qs-metadata-store,qs-engine-host,qs-integration-daemon,qs-view-server"
      server.port: "9443"
      HOST_FQDN: "${HOST_FQDN}"
      KAFKA_BOOTSTRAP_SERVERS: "egeria-shared-kafka:9192"
    healthcheck:
      test: curl -k -X GET "https://localhost:9443/open-metadata/platform-services/users/garygeeke/server-platform/origin" || exit 1
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ../../exchange-quickstart/landing-area:/deployments/landing-area
      - ../../exchange-quickstart/distribution-hub:/deployments/distribution-hub
      - ../../exchange-quickstart/distribution-hub/surveys:/deployments/surveys
      - ../../runtime-volumes/quickstart-platform-data/logs:/deployments/logs
      - ../../runtime-volumes/quickstart-platform-data/data:/deployments/data
      - ../../exchange-quickstart/loading-bay:/deployments/loading-bay
      - ../../exchange-quickstart/coco-data-lake:/deployments/coco-data-lake
      - ../../exchange-quickstart/treasury-dts-history:/deployments/treasury-dts-history
      - ../../work:/deployments/work
      - ../../runtime-volumes/quickstart-platform-data/quickstart.application.properties:/deployments/application.properties

  # Define your FastAPI application service
  pyegeria-web:
    container_name: quickstart-pyegeria-web
    build:
      context: ./PyegeriaWebHandler
      dockerfile: ./Dockerfile-fast-api
    ports:
      - "8000:8000" # Map host port 8000 to container port 8000
    networks:
      - egeria_network
    environment:
      EGERIA_PLATFORM_URL: https://egeria-main:9443
      EGERIA_VIEW_SERVER: qs-view-server
      EGERIA_VIEW_SERVER_URL: https://egeria-main:9443
      EGERIA_INTEGRATION_DAEMON_URL: https://egeria-main:9443
    volumes:
      - ./PyegeriaWebHandler:/app
      - ../../exchange-quickstart/distribution-hub/dr-egeria-outbox:/dr-egeria-outbox  # Mount the dr-egeria-outbox directory
      - ../../exchange-quickstart/loading-bay/dr-egeria-inbox:/dr-egeria-inbox
      - ../../exchange-quickstart/config:/config
# Mount the dr-egeria-inbox directory
#    environment:
      # Pass environment variables to the container
#      - REMOTE_SERVER_BASE_URL=https://host.docker.internal:9443
#      - API_KEY=your_secret_api_key # Example for sensitive data
    depends_on:
      # If your FastAPI app depends on a database, specify it here
      - egeria-main
    # Optional: for development, you might want hot-reloading
#     command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    command: uvicorn pyegeria_handler:app --host 0.0.0.0 --port 8000 --reload --loop asyncio

  apache-web:
    build:
      context: .
      dockerfile: Dockerfile-apache-web
    container_name: quickstart-web-server
    user: "daemon:daemon"  # Explicitly set the user and group to match httpd.conf
    ports:
      - "8085:8085"  # Map host port 8080 to container port 8080
    networks:
      - egeria_network
    volumes:
      - ../../exchange-quickstart/distribution-hub/dr-egeria-outbox:/usr/local/apache2/htdocs/dr-egeria-outbox  # Mount the dr-egeria-outbox directory
      - ../../exchange-quickstart/loading-bay/dr-egeria-inbox:/usr/local/apache2/htdocs/dr-egeria-inbox  # Mount the dr-egeria-inbox directory
      - ./httpd.conf:/usr/local/apache2/conf/httpd.conf  # Use the fixed configuration file
      - ./sites-available/fastapi-proxy.conf:/usr/local/apache2/conf/extra/fastapi-proxy.conf  # Mount the FastAPI proxy vhost file
      - ../../runtime-volumes/quickstart-apache-web/site:/usr/local/apache2/htdocs # mount site
      - ./markdown-header.html:/usr/local/apache2/conf/markdown-header.html  # Mount the markdown viewer
      - ../../runtime-volumes/quickstart-apache-web/ErrorLogs:/usr/local/apache2/logs  # Mount the logs directory
      - ../../workspaces/Dr-Egeria-Samples:/usr/local/apache2/htdocs/Dr-Egeria-Samples  # Mount the Dr-Egeria-Samples directory
    depends_on:
      - pyegeria-web


networks:
  egeria_network:
    driver: bridge
    name: egeria_network
    external: true
