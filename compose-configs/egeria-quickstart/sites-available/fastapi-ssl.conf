# apache/sites-available/fastapi-ssl.conf
#
# Optional HTTPS VirtualHost — only activated when this file is mounted into
#   /usr/local/apache2/conf/extra/fastapi-ssl.conf
#
# In demo mode this is handled automatically by quick-start-local --demo via
# the egeria-quickstart-demo.yaml overlay, which also mounts:
#   - ssl-define.conf       (runtime-generated; sets SSL_SERVER_NAME)
#   - /etc/ssl/egeria       (TLS certs from CERT_DIR)
#
# Manual setup: see README.md § SSL / HTTPS and demo-mode.md § SSL / HTTPS.
#
# SSL_SERVER_NAME is defined by ssl-define.conf, generated at deploy time from HOST_FQDN.
# The remaining paths are fixed inside the container (/etc/ssl/egeria/…).
Include conf/extra/ssl-define.conf

Define SSL_CERT_FILE   /etc/ssl/egeria/server.crt
Define SSL_KEY_FILE    /etc/ssl/egeria/server.key
Define SSL_CHAIN_FILE  /etc/ssl/egeria/server-ca.crt

LoadModule ssl_module             modules/mod_ssl.so
LoadModule socache_shmcb_module   modules/mod_socache_shmcb.so
LoadModule setenvif_module        modules/mod_setenvif.so

Listen 443

SSLSessionCache        shmcb:/usr/local/apache2/logs/ssl_scache(512000)
SSLSessionCacheTimeout 300

<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    ServerName ${SSL_SERVER_NAME}

    SSLEngine on
    SSLCertificateFile    ${SSL_CERT_FILE}
    SSLCertificateKeyFile ${SSL_KEY_FILE}
    SSLCertificateChainFile ${SSL_CHAIN_FILE}

    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    RedirectMatch ^/$ /portal

    Alias /local /usr/local/apache2/htdocs/local
    <Directory "/usr/local/apache2/htdocs/local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Location "/portal">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/portal
        ProxyPassReverse http://quickstart-pyegeria-web:8000/portal
        Require all granted
    </Location>

    <Location "/dr-egeria/process">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/dr-egeria/process
        ProxyPassReverse http://quickstart-pyegeria-web:8000/dr-egeria/process
        Require all granted
    </Location>

    <Location "/egeria-explorer">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/egeria-explorer
        ProxyPassReverse http://quickstart-pyegeria-web:8000/egeria-explorer
        Require all granted
    </Location>

    <Location "/type-explorer">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/type-explorer
        ProxyPassReverse http://quickstart-pyegeria-web:8000/type-explorer
        Require all granted
    </Location>

    <Location "/login">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/login
        ProxyPassReverse http://quickstart-pyegeria-web:8000/login
        Require all granted
    </Location>

    <Location "/register">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/register
        ProxyPassReverse http://quickstart-pyegeria-web:8000/register
        Require all granted
    </Location>

    <Location "/admin">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/admin
        ProxyPassReverse http://quickstart-pyegeria-web:8000/admin
        Require all granted
    </Location>

    <Location "/privacy">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/privacy
        ProxyPassReverse http://quickstart-pyegeria-web:8000/privacy
        Require all granted
    </Location>

    <Location "/reset-password">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/reset-password
        ProxyPassReverse http://quickstart-pyegeria-web:8000/reset-password
        Require all granted
    </Location>

    <Location "/static">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/static
        ProxyPassReverse http://quickstart-pyegeria-web:8000/static
        Require all granted
    </Location>

    <Location "/api">
        ProxyPreserveHost On
        ProxyPass http://quickstart-pyegeria-web:8000/api
        ProxyPassReverse http://quickstart-pyegeria-web:8000/api
        Require all granted
    </Location>

    # my-egeria Textual app — mod_proxy_wstunnel handles WS upgrade.
    <Location "/my-egeria/">
        ProxyPreserveHost On
        ProxyPass        http://quickstart-my-profile:8020/ upgrade=websocket
        ProxyPassReverse http://quickstart-my-profile:8020/
        Require all granted
    </Location>

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{Host}i"

</VirtualHost>
