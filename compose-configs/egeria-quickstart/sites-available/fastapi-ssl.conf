# apache/sites-available/fastapi-ssl.conf
#
# Optional HTTPS VirtualHost — only activated when this file is mounted into
#   /usr/local/apache2/conf/extra/fastapi-ssl.conf
#
# In egeria-quickstart.yaml add to apache-web volumes:
#   - ./sites-available/fastapi-ssl.conf:/usr/local/apache2/conf/extra/fastapi-ssl.conf
#   - /path/to/certs:/etc/ssl/egeria:ro
# and expose port 443:
#   ports:
#     - "443:443"
#
# ── Deployment-specific values — edit these three lines ──────────────────────
Define SSL_SERVER_NAME egeria.pdr-associates.com
Define SSL_CERT_FILE   /etc/ssl/egeria/server.crt
Define SSL_KEY_FILE    /etc/ssl/egeria/server.key
Define SSL_CHAIN_FILE  /etc/ssl/egeria/server-ca.crt
# ─────────────────────────────────────────────────────────────────────────────

LoadModule ssl_module             modules/mod_ssl.so
LoadModule socache_shmcb_module   modules/mod_socache_shmcb.so
LoadModule setenvif_module        modules/mod_setenvif.so

Listen 443

SSLSessionCache        shmcb:/usr/local/apache2/logs/ssl_scache(512000)
SSLSessionCacheTimeout 300

<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    ServerName ${SSL_SERVER_NAME}

    SSLEngine on
    SSLCertificateFile    ${SSL_CERT_FILE}
    SSLCertificateKeyFile ${SSL_KEY_FILE}
    SSLCertificateChainFile ${SSL_CHAIN_FILE}

    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    RedirectMatch ^/$ /portal

    Alias /local /usr/local/apache2/htdocs/local
    <Directory "/usr/local/apache2/htdocs/local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Location "/portal">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/portal
        ProxyPassReverse http://pyegeria-web:8000/portal
        Require all granted
    </Location>

    <Location "/dr-egeria/process">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/dr-egeria/process
        ProxyPassReverse http://pyegeria-web:8000/dr-egeria/process
        Require all granted
    </Location>

    <Location "/egeria-explorer">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/egeria-explorer
        ProxyPassReverse http://pyegeria-web:8000/egeria-explorer
        Require all granted
    </Location>

    <Location "/type-explorer">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/type-explorer
        ProxyPassReverse http://pyegeria-web:8000/type-explorer
        Require all granted
    </Location>

    <Location "/login">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/login
        ProxyPassReverse http://pyegeria-web:8000/login
        Require all granted
    </Location>

    <Location "/register">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/register
        ProxyPassReverse http://pyegeria-web:8000/register
        Require all granted
    </Location>

    <Location "/admin">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/admin
        ProxyPassReverse http://pyegeria-web:8000/admin
        Require all granted
    </Location>

    <Location "/privacy">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/privacy
        ProxyPassReverse http://pyegeria-web:8000/privacy
        Require all granted
    </Location>

    <Location "/reset-password">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/reset-password
        ProxyPassReverse http://pyegeria-web:8000/reset-password
        Require all granted
    </Location>

    <Location "/static">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/static
        ProxyPassReverse http://pyegeria-web:8000/static
        Require all granted
    </Location>

    <Location "/api">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/api
        ProxyPassReverse http://pyegeria-web:8000/api
        Require all granted
    </Location>

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{Host}i"

</VirtualHost>
