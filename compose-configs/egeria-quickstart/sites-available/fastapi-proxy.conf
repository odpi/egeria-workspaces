        ProxyPassReverse http://pyegeria-web:8000/register
        Require all granted
    </Location>

    <Location "/admin">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/admin
        ProxyPassReverse http://pyegeria-web:8000/admin
        Require all granted
    </Location>

    <Location "/privacy">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/privacy
        ProxyPassReverse http://pyegeria-web:8000/privacy
