# apache/sites-available/fastapi-proxy.conf

<VirtualHost *:8085>
    ServerAdmin dan.wolfson@pdr-associates.com
    ServerName localhost:8085
    ServerAlias www.localhost

    # Serve site content from Apache's htdocs
    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    # Root → portal redirect (static site has moved to /local)
    RedirectMatch ^/$ /portal

    # /local serves the legacy static website (volume mounted at htdocs/local)
    Alias /local /usr/local/apache2/htdocs/local
    <Directory "/usr/local/apache2/htdocs/local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Portal documentation hub (client-side markdown rendering)
    Alias /docs /usr/local/apache2/htdocs/docs
    <Directory "/usr/local/apache2/htdocs/docs">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # Demo portal hub
    <Location "/portal">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/portal
        ProxyPassReverse http://host.docker.internal:8000/portal
        Require all granted
    </Location>

    # Only proxy specific FastAPI endpoints; do not proxy the entire site
    <Location "/dr-egeria/process">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/dr-egeria/process
        ProxyPassReverse http://host.docker.internal:8000/dr-egeria/process
        Require all granted
    </Location>

    # Egeria Explorer UI
    <Location "/egeria-explorer">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/egeria-explorer
        ProxyPassReverse http://host.docker.internal:8000/egeria-explorer
        Require all granted
    </Location>

    # Legacy alias
    <Location "/type-explorer">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/type-explorer
        ProxyPassReverse http://host.docker.internal:8000/type-explorer
        Require all granted
    </Location>

    # Demo auth / registration pages
    <Location "/login">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/login
        ProxyPassReverse http://host.docker.internal:8000/login
        Require all granted
    </Location>

    <Location "/register">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/register
        ProxyPassReverse http://host.docker.internal:8000/register
        Require all granted
    </Location>

    <Location "/admin">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/admin
        ProxyPassReverse http://host.docker.internal:8000/admin
        Require all granted
    </Location>

    <Location "/privacy">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/privacy
        ProxyPassReverse http://host.docker.internal:8000/privacy
        Require all granted
    </Location>

    <Location "/reset-password">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/reset-password
        ProxyPassReverse http://host.docker.internal:8000/reset-password
        Require all granted
    </Location>

    # Static assets served by FastAPI (logos, images)
    <Location "/static">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/static
        ProxyPassReverse http://host.docker.internal:8000/static
        Require all granted
    </Location>

    # FastAPI REST endpoints — proxy all /api/* to the pyegeria-web backend
    <Location "/api">
        ProxyPreserveHost On
        ProxyPass http://host.docker.internal:8000/api
        ProxyPassReverse http://host.docker.internal:8000/api
        Require all granted
    </Location>

    # my-egeria Textual app — upgrade=websocket handles both HTTP and WS upgrades
    <Location "/my-egeria/">
        ProxyPreserveHost On
        ProxyPass        "http://quickstart-my-profile:8020/" upgrade=websocket
        ProxyPassReverse "http://quickstart-my-profile:8020/"
        Require all granted
    </Location>

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined

    # Add headers for better proxy behavior
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "%{Host}i"

</VirtualHost>