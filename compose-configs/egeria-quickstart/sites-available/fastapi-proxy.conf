        ProxyPassReverse http://pyegeria-web:8000/egeria-explorer
        Require all granted
    </Location>

    <Location "/type-explorer">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/type-explorer
        ProxyPassReverse http://pyegeria-web:8000/type-explorer
        Require all granted
    </Location>

    <Location "/login">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/login
        ProxyPassReverse http://pyegeria-web:8000/login
        Require all granted
    </Location>

    <Location "/register">
        ProxyPreserveHost On
