    </Directory>

    <Location "/portal">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/portal
        ProxyPassReverse http://pyegeria-web:8000/portal
        Require all granted
    </Location>

    <Location "/dr-egeria/process">
        ProxyPreserveHost On
        ProxyPass http://pyegeria-web:8000/dr-egeria/process
