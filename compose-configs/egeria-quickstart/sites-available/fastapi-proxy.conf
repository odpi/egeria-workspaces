# apache/sites-available/fastapi-proxy.conf

<VirtualHost *:8085>
    ServerAdmin dan.wolfson@pdr-associates.com
    ServerName localhost:8885
    ServerAlias www.localhost

    # Serve site content from Apache's htdocs
    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks Includes ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    # Root → portal redirect (static site has moved to /local)
    RedirectMatch ^/$ /portal

    # /local serves the legacy static website (volume mounted at htdocs/local)
    Alias /local /usr/local/apache2/htdocs/local
    <Directory "/usr/local/apache2/htdocs/local">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Portal documentation hub (client-side markdown rendering)
    Alias /docs /usr/local/apache2/htdocs/docs
    <Directory "/usr/local/apache2/htdocs/docs">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # All proxy routes — shared with the SSL vhost via proxy-locations.conf.
    # Add new routes there, not here.
    Include conf/extra/proxy-locations.conf

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "%{Host}i"

</VirtualHost>
