# proxy-locations.conf — shared proxy Location blocks
#
# Included by both fastapi-proxy.conf (HTTP :8085) and fastapi-ssl.conf (HTTPS :443).
# Add new routes here ONLY — do not duplicate them in either vhost file.

<Location "/portal">
    ProxyPreserveHost On
    ProxyPass http://quickstart-pyegeria-web:8000/portal
    ProxyPassReverse http://quickstart-pyegeria-web:8000/portal
    Require all granted
</Location>

