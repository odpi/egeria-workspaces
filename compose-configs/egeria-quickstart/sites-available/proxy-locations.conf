# my-egeria Textual TUI — mod_proxy_wstunnel handles WS upgrade.
# MY_EGERIA_PUBLIC_URL must match the external URL so textual-serve emits
# same-origin asset/WebSocket URLs (/my-egeria/static/..., /my-egeria/ws).
RedirectMatch ^/my-egeria$ /my-egeria/
<Location "/my-egeria/">
    ProxyPreserveHost On
    ProxyPass        http://quickstart-my-profile:8020/ upgrade=websocket
    ProxyPassReverse http://quickstart-my-profile:8020/
    Require all granted
</Location>
